<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料翻訳アプリ - 高精度英日翻訳</title>
  <meta name="description" content="Google翻訳とMyMemoryを比較できる完全無料の翻訳アプリ。逆翻訳検証、複数行翻訳、英文添削機能付き。">
  <meta name="theme-color" content="#5366ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="翻訳">
  <link rel="manifest" href="./manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #5366ff;
      --primary-dark: #3d4fcf;
      --success: #10b981;
      --danger: #ef4444;
      --bg-light: #f8fafc;
      --bg-white: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: var(--shadow), 0 20px 40px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
      font-weight: 400;
    }

    .content {
      padding: 40px;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border);
    }

    .mode-tab {
      padding: 12px 20px;
      border: none;
      background: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .mode-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .mode-tab:hover {
      color: var(--primary);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    .language-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .language-select {
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg-white);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .language-select:hover {
      border-color: var(--primary);
    }

    .language-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(83, 102, 255, 0.1);
    }

    .swap-btn {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      background: var(--bg-white);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      color: var(--text-secondary);
    }

    .swap-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: rotate(180deg);
    }

    .flex-spacer {
      flex: 1;
      min-width: 100px;
    }

    .auto-translate-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-switch {
      width: 48px;
      height: 24px;
      background: var(--border);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
    }

    .toggle-switch.active {
      background: var(--success);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.3s ease;
    }

    .toggle-switch.active::after {
      left: 26px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .translation-section {
      margin-bottom: 30px;
    }

    .input-area {
      margin-bottom: 20px;
    }

    .column-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-primary);
      resize: vertical;
      transition: all 0.3s ease;
      background: var(--bg-white);
      min-height: 250px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(83, 102, 255, 0.1);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .result-card {
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-light);
      transition: all 0.3s ease;
    }

    .result-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(83, 102, 255, 0.15);
    }

    .result-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
      font-size: 13px;
    }

    .result-body {
      padding: 16px;
      min-height: 150px;
      overflow-y: auto;
      max-height: 300px;
    }

    .result-text {
      color: var(--text-primary);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .result-error {
      color: var(--danger);
      font-size: 12px;
    }

    .result-loading {
      color: var(--text-secondary);
      font-size: 12px;
      font-style: italic;
    }

    .result-buttons {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-white);
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--bg-white);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .clear-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      background: var(--bg-light);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .clear-btn:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 12px 24px;
      border: 2px solid var(--border);
      background: var(--bg-white);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .action-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-translation-result {
      border: 2px solid var(--success);
      border-radius: 8px;
      padding: 16px;
      background: #f0fdf4;
      margin-bottom: 20px;
    }

    .back-translation-title {
      font-weight: 600;
      color: var(--success);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .back-translation-comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .back-translation-item {
      padding: 12px;
      background: white;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .back-translation-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .back-translation-text {
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    .back-translation-match {
      margin-top: 12px;
      padding: 8px;
      background: var(--success);
      color: white;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }

    .batch-results {
      margin-bottom: 20px;
    }

    .batch-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .batch-table th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
    }

    .batch-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .batch-table tr:hover {
      background: var(--bg-light);
    }

    .status-message {
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .status-message.show {
      display: flex;
    }

    .status-message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .status-message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status-message.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .status-icon {
      flex-shrink: 0;
      font-size: 18px;
    }

    .check-section {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .check-btn {
      padding: 12px 28px;
      border: 2px solid var(--border);
      background: var(--bg-white);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .check-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .check-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .grammar-results {
      display: none;
      margin-bottom: 20px;
    }

    .grammar-results.show {
      display: block;
    }

    .grammar-results-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .grammar-item {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }

    .grammar-item-text {
      font-size: 14px;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .grammar-original {
      color: var(--danger);
      text-decoration: line-through;
    }

    .grammar-suggestion {
      color: var(--success);
      font-weight: 600;
    }

    .grammar-message {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .grammar-empty {
      text-align: center;
      padding: 20px;
      color: var(--success);
      font-size: 14px;
      font-weight: 600;
      background: var(--bg-light);
      border-radius: 8px;
    }

    .history-section {
      margin-top: 30px;
      border-top: 2px solid var(--border);
      padding-top: 30px;
    }

    .history-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-clear-btn {
      padding: 6px 12px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .history-clear-btn:hover {
      opacity: 0.9;
    }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .history-item-text {
      flex: 1;
      overflow: hidden;
    }

    .history-item-original {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-translated {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-buttons {
      display: flex;
      gap: 4px;
    }

    .history-btn {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: var(--bg-white);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .history-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .history-btn.delete:hover {
      background: var(--danger);
      border-color: var(--danger);
    }

    .history-empty {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .footer {
      padding: 24px 40px;
      background: var(--bg-light);
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .footer strong {
      color: var(--text-primary);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .results-grid {
        grid-template-columns: 1fr;
      }

      .header {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 24px;
      }

      .controls {
        flex-direction: column;
      }

      .language-group {
        width: 100%;
      }

      .language-select {
        flex: 1;
      }

      textarea {
        min-height: 200px;
      }

      .back-translation-comparison {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-light: #1e293b;
        --bg-white: #0f172a;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --border: #334155;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌍 無料翻訳アプリ</h1>
      <p>完全無料 • 複数エンジン比較 • 逆翻訳検証 • 一括翻訳</p>
    </div>

    <div class="content">
      <div id="statusMessage" class="status-message">
        <div class="status-icon">✓</div>
        <span id="statusText">完了しました</span>
      </div>

      <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode('normal')">通常モード</button>
        <button class="mode-tab" onclick="switchMode('batch')">複数行翻訳</button>
      </div>

      <div class="controls">
        <div class="language-group">
          <select id="sourceLang" class="language-select" onchange="scheduleTranslate()">
            <option value="auto">言語を自動判定</option>
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
          
          <button class="swap-btn" onclick="swapLanguages()" title="言語を入れ替え">⇄</button>
          
          <select id="targetLang" class="language-select" onchange="scheduleTranslate()">
            <option value="ja">日本語に翻訳</option>
            <option value="en">English に翻訳</option>
          </select>
        </div>

        <div class="flex-spacer"></div>

        <div class="auto-translate-toggle" id="autoToggle">
          <label class="toggle-label">自動翻訳</label>
          <button class="toggle-switch active" id="autoTranslateToggle" onclick="toggleAutoTranslate()"></button>
        </div>
      </div>

      <!-- 通常モード -->
      <div id="normalMode" class="translation-section">
        <div class="input-area">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <label class="column-label">入力テキスト</label>
            <button class="clear-btn" onclick="clearInput()" title="テキストをクリア">✕</button>
          </div>
          <textarea id="inputText" placeholder="翻訳したいテキストをここに貼り付けてください..." oninput="scheduleTranslate()"></textarea>
        </div>

        <div>
          <label class="column-label">翻訳結果（複数エンジン比較）</label>
          <div class="results-grid" id="resultsGrid">
            <div class="result-card">
              <div class="result-header">🌐 Google翻訳</div>
              <div class="result-body" id="googleResult">
                <div class="result-loading">翻訳待機中...</div>
              </div>
              <div class="result-buttons">
                <button class="btn" onclick="copyResult('google')">📋 コピー</button>
                <button class="btn" onclick="speakResult('google')">🔊</button>
              </div>
            </div>

            <div class="result-card">
              <div class="result-header">📚 MyMemory</div>
              <div class="result-body" id="memoryResult">
                <div class="result-loading">翻訳待機中...</div>
              </div>
              <div class="result-buttons">
                <button class="btn" onclick="copyResult('memory')">📋 コピー</button>
                <button class="btn" onclick="speakResult('memory')">🔊</button>
              </div>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="action-btn" onclick="checkEnglish()" id="checkBtn">📝 英文を添削する</button>
          <button class="action-btn" onclick="backTranslate()" id="backBtn">🔄 逆翻訳検証</button>
        </div>

        <div id="backTranslationSection" class="back-translation-result hidden">
          <div class="back-translation-title">🔄 逆翻訳検証結果</div>
          <div class="back-translation-comparison">
            <div class="back-translation-item">
              <div class="back-translation-label">元のテキスト</div>
              <div class="back-translation-text" id="originalText"></div>
            </div>
            <div class="back-translation-item">
              <div class="back-translation-label">逆翻訳結果</div>
              <div class="back-translation-text" id="backTranslatedText"></div>
            </div>
          </div>
          <div class="back-translation-match" id="matchPercentage"></div>
        </div>

        <div class="grammar-results" id="grammarResults">
          <div class="grammar-results-title">添削結果</div>
          <div id="grammarList"></div>
        </div>
      </div>

      <!-- 複数行モード -->
      <div id="batchMode" class="translation-section hidden">
        <div class="input-area">
          <label class="column-label">複数行テキスト（1行ずつ翻訳されます）</label>
          <textarea id="batchInputText" placeholder="複数行を貼り付けてください。&#10;各行が個別に翻訳されます。" oninput="updateBatchPreview()"></textarea>
        </div>

        <div class="action-buttons">
          <button class="action-btn" onclick="doBatchTranslation()" id="batchTranslateBtn">🚀 翻訳実行</button>
          <button class="action-btn" onclick="downloadBatchCSV()" id="downloadBtn" disabled>📥 CSVダウンロード</button>
        </div>

        <div id="batchResultsSection" class="batch-results hidden">
          <label class="column-label">翻訳結果</label>
          <table class="batch-table">
            <thead>
              <tr>
                <th>行番号</th>
                <th>元のテキスト</th>
                <th>Google翻訳</th>
                <th>MyMemory</th>
              </tr>
            </thead>
            <tbody id="batchResultsTable">
            </tbody>
          </table>
        </div>
      </div>

      <div class="check-section" id="checkSection"></div>

      <div class="history-section">
        <div class="history-title">
          📜 翻訳履歴
          <button class="history-clear-btn" onclick="clearAllHistory()">全削除</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">翻訳がまだありません</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentMode = 'normal';
    let isTranslating = false;
    let autoTranslateEnabled = true;
    let translateTimeout = null;
    let lastTranslatedText = '';
    let translationHistory = [];
    let lastResults = {};
    let batchResults = [];

    window.addEventListener('load', () => {
      loadHistory();
      showMessage('準備完了！自動翻訳がONになっています', 'info', '✨');
    });

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('normalMode').classList.toggle('hidden', mode !== 'normal');
      document.getElementById('batchMode').classList.toggle('hidden', mode !== 'batch');
      document.getElementById('autoToggle').classList.toggle('hidden', mode !== 'normal');

      if (mode === 'normal') {
        showMessage('通常モードに切り替えました', 'info', '🔄');
      } else {
        showMessage('複数行モードに切り替えました', 'info', '🔄');
      }
    }

    function detectLanguage(text) {
      const japaneseRegex = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\u3400-\u4DBF]/g;
      const japaneseMatches = text.match(japaneseRegex) || [];
      
      const englishRegex = /[a-zA-Z]/g;
      const englishMatches = text.match(englishRegex) || [];

      if (japaneseMatches.length > englishMatches.length / 2) {
        return 'ja';
      }
      return 'en';
    }

    function scheduleTranslate() {
      if (currentMode !== 'normal' || !autoTranslateEnabled) return;

      if (translateTimeout) {
        clearTimeout(translateTimeout);
      }

      translateTimeout = setTimeout(() => {
        handleTranslate();
      }, 500);
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
      document.getElementById('inputText').focus();
      clearResults();
      document.getElementById('backTranslationSection').classList.add('hidden');
      document.getElementById('grammarResults').classList.remove('show');
      lastTranslatedText = '';
      showMessage('テキストをクリアしました', 'success', '✓');
    }

    async function handleTranslate() {
      const inputText = document.getElementById('inputText').value.trim();
      const sourceLanguage = document.getElementById('sourceLang').value;
      const targetLanguage = document.getElementById('targetLang').value;

      if (!inputText) {
        clearResults();
        return;
      }

      if (inputText === lastTranslatedText && !isTranslating) {
        return;
      }

      if (sourceLanguage !== 'auto' && sourceLanguage === targetLanguage) {
        return;
      }

      isTranslating = true;

      try {
        let sourceLang = sourceLanguage;
        let actualTargetLang = targetLanguage;

        if (sourceLanguage === 'auto') {
          sourceLang = detectLanguage(inputText);
          if (sourceLang === targetLanguage) {
            actualTargetLang = (sourceLang === 'ja') ? 'en' : 'ja';
          }
        }

        const [googleResult, memoryResult] = await Promise.all([
          translateGoogle(inputText, sourceLang, actualTargetLang),
          translateMemory(inputText, sourceLang, actualTargetLang)
        ]);

        lastResults = {
          google: googleResult.translation,
          memory: memoryResult.translation
        };

        displayResults(googleResult, memoryResult);
        lastTranslatedText = inputText;
        
        if (googleResult.success) {
          addToHistory(inputText, googleResult.translation);
        }
      } catch (error) {
        console.error('翻訳エラー:', error);
        showMessage('翻訳中にエラーが発生しました', 'error', '✗');
      } finally {
        isTranslating = false;
      }
    }

    async function translateGoogle(text, sourceLang, targetLang) {
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();

        if (data && data[0]) {
          const translation = data[0].map(item => item[0]).join('');
          if (translation) {
            return { success: true, translation };
          }
        }

        throw new Error('翻訳結果なし');
      } catch (error) {
        return { success: false, translation: '', error: error.message };
      }
    }

    async function translateMemory(text, sourceLang, targetLang) {
      try {
        const langPair = `${sourceLang}|${targetLang}`;
        const url = new URL('https://api.mymemory.translated.net/get');
        url.searchParams.append('q', text);
        url.searchParams.append('langpair', langPair);

        const response = await fetch(url.toString());

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();

        if (data.responseStatus === 200 && data.responseData.translatedText) {
          return { success: true, translation: data.responseData.translatedText };
        }

        throw new Error('翻訳結果なし');
      } catch (error) {
        return { success: false, translation: '', error: error.message };
      }
    }

    function displayResults(googleResult, memoryResult) {
      displayResult('google', googleResult);
      displayResult('memory', memoryResult);
    }

    function displayResult(key, result) {
      const el = document.getElementById(key + 'Result');

      if (result.success) {
        el.innerHTML = `<div class="result-text">${escapeHtml(result.translation)}</div>`;
      } else {
        el.innerHTML = `<div class="result-error">エラー: ${escapeHtml(result.error)}</div>`;
      }
    }

    function clearResults() {
      document.getElementById('googleResult').innerHTML = '<div class="result-loading">翻訳待機中...</div>';
      document.getElementById('memoryResult').innerHTML = '<div class="result-loading">翻訳待機中...</div>';
      lastResults = {};
    }

    async function backTranslate() {
      const inputText = document.getElementById('inputText').value.trim();
      const sourceLanguage = document.getElementById('sourceLang').value;
      const targetLanguage = document.getElementById('targetLang').value;

      if (!inputText || !lastResults.google) {
        showMessage('翻訳結果がありません', 'error', '⚠');
        return;
      }

      let sourceLang = sourceLanguage;
      let actualTargetLang = targetLanguage;

      if (sourceLanguage === 'auto') {
        sourceLang = detectLanguage(inputText);
        if (sourceLang === targetLanguage) {
          actualTargetLang = (sourceLang === 'ja') ? 'en' : 'ja';
        }
      }

      const reverseLang = actualTargetLang;
      const reverseTargetLang = sourceLang;

      try {
        const backResult = await translateGoogle(lastResults.google, reverseLang, reverseTargetLang);

        if (backResult.success) {
          const originalText = inputText;
          const backTranslatedText = backResult.translation;
          const similarity = calculateSimilarity(originalText, backTranslatedText);

          document.getElementById('originalText').textContent = originalText;
          document.getElementById('backTranslatedText').textContent = backTranslatedText;
          document.getElementById('matchPercentage').textContent = `一致度: ${similarity}%`;
          document.getElementById('backTranslationSection').classList.remove('hidden');

          showMessage('逆翻訳検証が完了しました', 'success', '✓');
        }
      } catch (error) {
        showMessage('逆翻訳に失敗しました', 'error', '✗');
      }
    }

    function calculateSimilarity(str1, str2) {
      const longer = str1.length > str2.length ? str1 : str2;
      const shorter = str1.length > str2.length ? str2 : str1;

      if (longer.length === 0) return 100;

      const editDistance = levenshteinDistance(longer.toLowerCase(), shorter.toLowerCase());
      const similarity = ((longer.length - editDistance) / longer.length) * 100;

      return Math.round(similarity);
    }

    function levenshteinDistance(str1, str2) {
      const matrix = [];

      for (let i = 0; i <= str2.length; i++) {
        matrix[i] = [i];
      }

      for (let j = 0; j <= str1.length; j++) {
        matrix[0][j] = j;
      }

      for (let i = 1; i <= str2.length; i++) {
        for (let j = 1; j <= str1.length; j++) {
          if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j] + 1
            );
          }
        }
      }

      return matrix[str2.length][str1.length];
    }

    function updateBatchPreview() {
      const text = document.getElementById('batchInputText').value.trim();
      const lines = text.split('\n').filter(line => line.trim().length > 0);
      document.getElementById('downloadBtn').disabled = lines.length === 0;
    }

    async function doBatchTranslation() {
      const text = document.getElementById('batchInputText').value.trim();
      const sourceLanguage = document.getElementById('sourceLang').value;
      const targetLanguage = document.getElementById('targetLang').value;

      const lines = text.split('\n').filter(line => line.trim().length > 0);

      if (lines.length === 0) {
        showMessage('テキストを入力してください', 'error', '⚠');
        return;
      }

      document.getElementById('batchTranslateBtn').disabled = true;
      document.getElementById('batchTranslateBtn').textContent = '翻訳中...';

      try {
        let sourceLang = sourceLanguage;
        let actualTargetLang = targetLanguage;

        if (sourceLanguage === 'auto') {
          sourceLang = detectLanguage(lines[0]);
          if (sourceLang === targetLanguage) {
            actualTargetLang = (sourceLang === 'ja') ? 'en' : 'ja';
          }
        }

        batchResults = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          const [googleResult, memoryResult] = await Promise.all([
            translateGoogle(line, sourceLang, actualTargetLang),
            translateMemory(line, sourceLang, actualTargetLang)
          ]);

          batchResults.push({
            lineNumber: i + 1,
            original: line,
            google: googleResult.translation,
            memory: memoryResult.translation
          });
        }

        displayBatchResults();
        document.getElementById('downloadBtn').disabled = false;
        showMessage(`${lines.length}行の翻訳が完了しました`, 'success', '✓');
      } catch (error) {
        console.error('一括翻訳エラー:', error);
        showMessage('翻訳中にエラーが発生しました', 'error', '✗');
      } finally {
        document.getElementById('batchTranslateBtn').disabled = false;
        document.getElementById('batchTranslateBtn').textContent = '🚀 翻訳実行';
      }
    }

    function displayBatchResults() {
      const tbody = document.getElementById('batchResultsTable');
      tbody.innerHTML = batchResults.map(result => `
        <tr>
          <td>${result.lineNumber}</td>
          <td>${escapeHtml(result.original)}</td>
          <td>${escapeHtml(result.google)}</td>
          <td>${escapeHtml(result.memory)}</td>
        </tr>
      `).join('');

      document.getElementById('batchResultsSection').classList.remove('hidden');
    }

    function downloadBatchCSV() {
      if (batchResults.length === 0) {
        showMessage('翻訳結果がありません', 'error', '⚠');
        return;
      }

      const csv = [
        ['行番号', '元のテキスト', 'Google翻訳', 'MyMemory'],
        ...batchResults.map(r => [r.lineNumber, r.original, r.google, r.memory])
      ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `translation_${new Date().getTime()}.csv`;
      link.click();

      showMessage('CSVをダウンロードしました', 'success', '✓');
    }

    function copyResult(engine) {
      const text = lastResults[engine];

      if (!text) {
        showMessage('コピーする内容がありません', 'error', '⚠');
        return;
      }

      navigator.clipboard.writeText(text).then(() => {
        showMessage('クリップボードにコピーしました', 'success', '✓');
      }).catch(() => {
        showMessage('コピーに失敗しました', 'error', '✗');
      });
    }

    function speakResult(engine) {
      const text = lastResults[engine];
      const targetLang = document.getElementById('targetLang').value;

      if (!text) {
        showMessage('読み上げるテキストがありません', 'error', '⚠');
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = targetLang === 'ja' ? 'ja-JP' : 'en-US';
      utterance.rate = 0.9;

      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);

      showMessage('読み上げ中...', 'info', '🔊');
    }

    function addToHistory(original, translated) {
      const item = {
        original: original.substring(0, 50),
        translated: translated.substring(0, 50),
        fullOriginal: original,
        fullTranslated: translated,
        timestamp: new Date().getTime()
      };

      translationHistory.unshift(item);
      if (translationHistory.length > 50) {
        translationHistory = translationHistory.slice(0, 50);
      }

      saveHistory();
      renderHistory();
    }

    function saveHistory() {
      try {
        localStorage.setItem('translationHistory', JSON.stringify(translationHistory));
      } catch (e) {
        console.error('履歴保存エラー:', e);
      }
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem('translationHistory');
        if (saved) {
          translationHistory = JSON.parse(saved);
          renderHistory();
        }
      } catch (e) {
        console.error('履歴読み込みエラー:', e);
      }
    }

    function renderHistory() {
      const historyList = document.getElementById('historyList');

      if (translationHistory.length === 0) {
        historyList.innerHTML = '<div class="history-empty">翻訳がまだありません</div>';
        return;
      }

      historyList.innerHTML = translationHistory.map((item, index) => `
        <div class="history-item">
          <div class="history-item-text">
            <div class="history-item-original">${escapeHtml(item.original)}</div>
            <div class="history-item-translated">${escapeHtml(item.translated)}</div>
          </div>
          <div class="history-item-buttons">
            <button class="history-btn" onclick="restoreFromHistory(${index})">復元</button>
            <button class="history-btn delete" onclick="deleteFromHistory(${index})">×</button>
          </div>
        </div>
      `).join('');
    }

    function restoreFromHistory(index) {
      const item = translationHistory[index];
      document.getElementById('inputText').value = item.fullOriginal;
      lastTranslatedText = '';
      scheduleTranslate();
    }

    function deleteFromHistory(index) {
      translationHistory.splice(index, 1);
      saveHistory();
      renderHistory();
      showMessage('履歴から削除しました', 'success', '✓');
    }

    function clearAllHistory() {
      if (confirm('すべての翻訳履歴を削除してもよろしいですか？')) {
        translationHistory = [];
        saveHistory();
        renderHistory();
        showMessage('すべての履歴を削除しました', 'success', '✓');
      }
    }

    async function checkEnglish() {
      const inputText = document.getElementById('inputText').value.trim();
      const checkBtn = document.getElementById('checkBtn');

      let textToCheck = '';
      if (inputText && detectLanguage(inputText) === 'en') {
        textToCheck = inputText;
      } else {
        for (const key in lastResults) {
          if (lastResults[key] && detectLanguage(lastResults[key]) === 'en') {
            textToCheck = lastResults[key];
            break;
          }
        }
      }

      if (!textToCheck) {
        showMessage('チェックする英文が見つかりません', 'error', '⚠');
        return;
      }

      checkBtn.disabled = true;
      checkBtn.textContent = 'チェック中...';

      try {
        const response = await fetch('https://api.languagetool.org/v2/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ text: textToCheck, language: 'en-US' })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        await renderGrammarResults(textToCheck, data.matches || []);
        showMessage('添削が完了しました', 'success', '✓');
      } catch (error) {
        console.error('添削エラー:', error);
        showMessage(`添削エラー: ${error.message}`, 'error', '✗');
      } finally {
        checkBtn.disabled = false;
        checkBtn.textContent = '📝 英文を添削する';
      }
    }

    async function renderGrammarResults(text, matches) {
      const resultsPanel = document.getElementById('grammarResults');
      const listEl = document.getElementById('grammarList');
      listEl.innerHTML = '';

      if (matches.length === 0) {
        listEl.innerHTML = '<div class="grammar-empty">✅ 問題は見つかりませんでした！</div>';
        resultsPanel.classList.add('show');
        return;
      }

      const translations = await Promise.all(
        matches.map(match => translateGoogle(match.message, 'en', 'ja'))
      );

      matches.forEach((match, index) => {
        const original = text.substring(match.offset, match.offset + match.length);
        const suggestions = (match.replacements || [])
          .slice(0, 3)
          .map(r => r.value)
          .filter(v => v);

        const item = document.createElement('div');
        item.className = 'grammar-item';

        let html = '<div class="grammar-item-text">';
        html += `<span class="grammar-original">${escapeHtml(original)}</span>`;
        if (suggestions.length > 0) {
          html += ` → <span class="grammar-suggestion">${escapeHtml(suggestions.join(' / '))}</span>`;
        }
        html += '</div>';

        const translationResult = translations[index];
        const messageText = (translationResult && translationResult.success)
          ? translationResult.translation
          : match.message;

        html += `<div class="grammar-message">${escapeHtml(messageText)}</div>`;

        item.innerHTML = html;
        listEl.appendChild(item);
      });

      resultsPanel.classList.add('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function swapLanguages() {
      const sourceLang = document.getElementById('sourceLang');
      const targetLang = document.getElementById('targetLang');
      const inputText = document.getElementById('inputText');

      if (sourceLang.value !== 'auto') {
        const tempLang = sourceLang.value;
        sourceLang.value = targetLang.value;
        targetLang.value = tempLang;
      }

      lastTranslatedText = '';
      scheduleTranslate();
      inputText.focus();
    }

    function toggleAutoTranslate() {
      const toggle = document.getElementById('autoTranslateToggle');
      autoTranslateEnabled = !autoTranslateEnabled;
      
      if (autoTranslateEnabled) {
        toggle.classList.add('active');
        showMessage('自動翻訳: ON', 'info', '✓');
        scheduleTranslate();
      } else {
        toggle.classList.remove('active');
        showMessage('自動翻訳: OFF', 'info', '✗');
      }
    }

    function showMessage(message, type = 'info', icon = 'ℹ') {
      const messageEl = document.getElementById('statusMessage');
      const statusText = document.getElementById('statusText');
      const statusIcon = messageEl.querySelector('.status-icon');

      statusText.textContent = message;
      statusIcon.textContent = icon;
      messageEl.className = `status-message show ${type}`;

      setTimeout(() => {
        messageEl.classList.remove('show');
      }, 3000);
    }

    document.getElementById('inputText').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        lastTranslatedText = '';
        handleTranslate();
      }
    });

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').then(registration => {
        console.log('Service Worker登録成功:', registration);
      }).catch(error => {
        console.log('Service Worker登録失敗:', error);
      });
    }
  </script>
</body>
</html>
